name: k8-certificates

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-k8cert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-k8certificates}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-k8cert}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-k8cert}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-k8certificates}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SHOW_TEST_BANNER: ${NEXT_PUBLIC_SHOW_TEST_BANNER:-true}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_SHOW_TEST_BANNER: ${NEXT_PUBLIC_SHOW_TEST_BANNER:-true}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    profiles: ["single-host"]
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

volumes:
  pg_data:
